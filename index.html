<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Special Surprise</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="sparkle-container"></div>
    <div class="confetti-container" id="confetti"></div>
    
    <!-- Visit Counter -->
    <div class="visit-counter">
        <p>✨ Visits: <span id="visit-count">0</span></p>
    </div>
    
    <!-- Main Section -->
    <div class="container" id="main">
        <div class="heart-icon">💜</div>
        <h1>✨ To My Dearest Munmun Ma'am ✨</h1>
        <p class="subtitle">A little piece of my heart, just for you.</p>
        <button class="btn-primary" onclick="start()">Begin Our Journey</button>
        <div class="floating-hearts">
            <span class="heart">💜</span>
            <span class="heart">💜</span>
            <span class="heart">💜</span>
        </div>
    </div>

    <!-- Story Section -->
    <div class="container" id="story-section" style="display:none;">
        <div class="progress-bar">
            <div class="progress-fill" id="progress-fill"></div>
        </div>
        
        <p id="p-display"></p>
        
        <div class="button-group">
            <button class="btn-primary" id="next-btn" style="display:none;" onclick="next()">Read More ➜</button>
            <button class="btn-secret" id="secret-btn" style="display:none;" onclick="show()">💌 My Unsent Message</button>
        </div>
        
        <img id="secret-img" src="https://i.ibb.co/6H8f9r0/Screenshot-2026-0715-202950.jpg" alt="Secret Message">
        
        <div style="display:none;">
            <iframe id="yt-player" width="1" height="1" src="https://www.youtube.com/embed/9Q2xAfcl-RE?autoplay=1" frameborder="0" allow="autoplay"></iframe>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
